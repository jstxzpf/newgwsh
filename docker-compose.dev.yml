version: '3.8'

services:
  # 1. 开发数据库：PostgreSQL 16 + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=newgwsh_db
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    networks:
      - backend_net

  # 2. 开发缓存与锁控：Redis 7.2
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - backend_net

  # 3. 开发 API 引擎 (FastAPI)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/app/prompts:/app/app/prompts
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=newgwsh_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SIP_SECRET_KEY=TX_NBS_DEV_SECRET
      - SECRET_KEY=TX_NBS_DEV_JWT_SECRET_999
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
    networks:
      - frontend_net
      - backend_net

  # 4. 异步任务 Worker (POLISH / FORMAT / PARSE)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=newgwsh_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SIP_SECRET_KEY=TX_NBS_DEV_SECRET
      - SECRET_KEY=TX_NBS_DEV_JWT_SECRET_999
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
    networks:
      - backend_net

  # 5. 前端开发容器 (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # 防止 node_modules 被宿主机覆盖
      - /app/node_modules
    depends_on:
      - api
    networks:
      - frontend_net

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  pg_dev_data:
  redis_dev_data:
  archive_root: