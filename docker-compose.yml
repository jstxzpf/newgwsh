version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: nbs_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-taixing_nbs}
    ports:
      - "5432:5432"
    volumes:
      - nbs_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nbs_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: nbs_backend
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/archive:/app/data/archive

  worker:
    build: ./backend
    container_name: nbs_worker
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info -Q taixing_tasks
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/archive:/app/data/archive

  frontend:
    build: ./frontend
    container_name: nbs_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  nbs_postgres_data:
